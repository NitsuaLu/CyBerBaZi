services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: bazi-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"

  nginx:
    image: nginx:alpine
    container_name: bazi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./apps/web/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
